<!DOCTYPE html>
<html>
<head>
<title>CSS Shape Animations</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(120deg,#1e3c72,#2a5298);
}

.container{
    width:700px;
    height:400px;
    position:relative;
}

/* 1 HEXAGON */
.hexagon{
    position:absolute;
    width:80px;
    height:45px;
    background:#ff4757;
    top:50px;
    left:50px;
    animation:slide 4s infinite alternate;
}

.hexagon:before,
.hexagon:after{
    content:"";
    position:absolute;
    width:0;
    border-left:40px solid transparent;
    border-right:40px solid transparent;
}

.hexagon:before{
    bottom:100%;
    border-bottom:23px solid #ff4757;
}

.hexagon:after{
    top:100%;
    border-top:23px solid #ff4757;
}

@keyframes slide{
    from{left:50px;}
    to{left:550px;}
}


/* 2 CIRCLE PULSE */

.circle{
    width:70px;
    height:70px;
    background:#2ed573;
    border-radius:50%;
    position:absolute;
    top:150px;
    left:100px;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.5);}
    100%{transform:scale(1);}
}


/* 3 RECTANGLE BOUNCE */

.rectangle{
    width:120px;
    height:50px;
    background:#ffa502;
    position:absolute;
    top:0;
    right:100px;
    animation:bounce 3s infinite;
}

@keyframes bounce{
    0%{top:0;}
    50%{top:250px;}
    100%{top:0;}
}


/* 4 PENTAGON ROTATE */

.pentagon{
    position:absolute;
    width:60px;
    border-width:60px 20px 0;
    border-style:solid;
    border-color:#3742fa transparent;
    top:250px;
    left:300px;
    animation:rotate 3s infinite linear;
}

@keyframes rotate{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}


/* 5 OVAL FLOAT */

.oval{
    width:120px;
    height:60px;
    background:#ff6b81;
    border-radius:50%;
    position:absolute;
    bottom:50px;
    right:150px;
    animation:float 4s infinite alternate;
}

@keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-80px);}
}

</style>
</head>

<body>

<div class="container">

<div class="hexagon"></div>
<div class="circle"></div>
<div class="rectangle"></div>
<div class="pentagon"></div>
<div class="oval"></div>

</div>

</body>t
</html>
