        <script>
            // var a=10;

            // var name ="sanjana"

            //Normal function
            function Sum(){
                var a =10;
                var b=20;
                document.write("The sum of a and b is: "+(a+b));
            };
            Sum()//function call

            //parmerterized function
            function Sum(a,b){
                document.write("The sum of a and b is: "+(a+b));
            };
            Sum(100,200)

            //parameter with values
            function Sum(a=10,b=20){
                document.write("The sum of a and b is: "+(a+b));
            };
            Sum()//function call with default values

            //arrow function
            var Sum=()=>{
                var a =10;
                var b=20;
                document.write("The sum of a and b is: "+(a+b));
            };

        </script>
    </body>
